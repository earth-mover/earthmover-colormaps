name: Publish to PyPI

# Triggered when a GitHub release is published. Publishing to PyPI uses OIDC
# trusted publishing — no API tokens. The PyPI side must be configured first:
#
#   PyPI → project → Settings → Publishing → Add trusted publisher:
#     Owner:           earth-mover
#     Repository:      earthmover-colormaps
#     Workflow name:   publish.yml
#     Environment:     pypi
#
# (Use a "pending publisher" if the project is not yet on PyPI.)

on:
  release:
    types: [published]

jobs:
  build:
    name: Build sdist and wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Build distributions
        run: uv build

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/earthmover-colormaps
    permissions:
      id-token: write   # required for OIDC trusted publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
